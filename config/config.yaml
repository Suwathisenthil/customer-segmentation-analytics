project:
  name: "Customer Segmentation Analysis"
  version: "2.0.0"
  author: "Analytics Intern"
  company: "Fortune 500 Retail Corp"

data:
  raw_path: "data/customers.csv"
  output_path: "outputs/customer_segments.csv"
  n_synthetic: 2000
  random_seed: 42

features:
  clustering:
    - annual_income
    - spending_score
    - purchase_freq
    - avg_order_value
    - clv_proxy
    - loyalty_index
    - net_spend_score

model:
  kmeans:
    k_range: [2, 11]
    n_init: 10
    random_state: 42
  dbscan:
    eps: 0.8
    min_samples: 10
  agglomerative:
    linkage: "ward"
  gmm:
    covariance_type: "full"

business:
  avg_acquisition_cost: 45.0        # $ per customer
  avg_monthly_revenue_per_customer: 120.0
  marketing_campaign_cost: 5000.0   # $ per campaign
  campaign_conversion_rate: 0.12
  churn_revenue_loss_per_customer: 800.0
  retention_campaign_success_rate: 0.30

output:
  figures_dir: "outputs/figures"
  reports_dir: "outputs/reports"
  log_file: "outputs/pipeline.log"
  log_level: "INFO"
